name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.wixproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet restore installer/ArcadeCabinetSwitcher.Installer/ArcadeCabinetSwitcher.Installer.wixproj

      - name: Test
        run: dotnet test --configuration Release --logger "console;verbosity=normal" --filter "TestCategory!=Integration"

      - name: Extract version from tag
        id: version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $msiVersion = $version -replace '[-+].*$',''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "MSI_VERSION=$msiVersion" >> $env:GITHUB_OUTPUT

      - name: Publish win-x64
        run: >
          dotnet publish src/ArcadeCabinetSwitcher/ArcadeCabinetSwitcher.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=false
          --output publish/win-x64

      - name: Build MSI
        run: >
          dotnet build installer/ArcadeCabinetSwitcher.Installer/ArcadeCabinetSwitcher.Installer.wixproj
          --configuration Release
          -p:InstallerVersion=${{ steps.version.outputs.MSI_VERSION }}
          "-p:PublishDir=${{ github.workspace }}\publish\win-x64\"

      - name: Zip release asset
        run: >
          Compress-Archive
          -Path publish/win-x64/*
          -DestinationPath "ArcadeCabinetSwitcher-${{ steps.version.outputs.VERSION }}-win-x64.zip"

      - name: Stage MSI for upload
        run: |
          $msi = Get-ChildItem -Path installer -Recurse -Filter "*.msi" | Select-Object -First 1
          Copy-Item $msi.FullName "ArcadeCabinetSwitcher-${{ steps.version.outputs.VERSION }}-win-x64.msi"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "ArcadeCabinetSwitcher-${{ steps.version.outputs.VERSION }}-win-x64.zip" --clobber
          gh release upload "${{ github.ref_name }}" "ArcadeCabinetSwitcher-${{ steps.version.outputs.VERSION }}-win-x64.msi" --clobber
